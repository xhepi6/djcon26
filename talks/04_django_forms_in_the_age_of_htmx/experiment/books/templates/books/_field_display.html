{# Display partial: the 'read mode' of a field.
   When Edit is clicked, hx-get fetches the form fragment and swaps it into
   the parent `.field` div (innerHTML). On Save/Cancel it swaps back to this. #}
<span class="value">
    {% if value %}{{ value }}{% else %}<em class="empty">(empty)</em>{% endif %}
</span>
<button type="button"
        hx-get="{% url 'book-field-form' pk=object.pk fieldname=fieldname %}"
        hx-target="closest .field"
        hx-swap="innerHTML">Edit</button>
